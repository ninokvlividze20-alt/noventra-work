<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ავტორიზაცია - Noventra</title>
    <style>
        body { background-color: #050505; color: #fff; padding: 40px; font-family: sans-serif; }
        input { display: block; width: 300px; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <h1>ავტორიზაცია</h1>
    <form method="POST">
        <input type="text" name="username" placeholder="მომხმარებლის სახელი" required>
        <input type="password" name="password" placeholder="პაროლი" required>
        <button type="submit">შესვლა</button>
    </form>
    <br>
    <a href="/register" style="color: #00ffcc;">ჯერ არ გაქვს ანგარიში? დარეგისტრირდი</a>
</body>
</html>
