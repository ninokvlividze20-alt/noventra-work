{% extends 'base.html' %}

{% block content %}
<style>
    .form-container { 
        background-color: #121212; 
        padding: 25px; 
        border-radius: 15px; 
        border: 1px solid #00ffcc; 
        width: 100%; 
        max-width: 400px; 
        text-align: center; 
        box-shadow: 0 4px 15px rgba(0,255,204,0.2); 
        margin: 0 auto;
    }
    h2 { margin-bottom: 20px; color: #00ffcc; }
    input { 
        width: 100%; 
        padding: 12px; 
        margin: 10px 0; 
        border-radius: 8px; 
        border: 1px solid #333; 
        background: #000; 
        color: #fff; 
        box-sizing: border-box; 
        font-size: 16px; 
    }
    button { 
        width: 100%; 
        padding: 12px; 
        margin-top: 10px; 
        background-color: #00ffcc; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        color: #000; 
        font-size: 16px; 
    }
</style>

<div class="form-container">
    <h2>ავტორიზაცია</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <input type="text" name="username" placeholder="სახელი" required>
        <input type="password" name="password" placeholder="პაროლი" required>
        <button type="submit">შესვლა</button>
    </form>
</div>
{% endblock %}
