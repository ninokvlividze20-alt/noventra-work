<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noventra</title>
    <style>
        /* აქ ვწერთ საერთო სტილებს ყველა გვერდისთვის */
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; }
        button { background-color: #00ffcc; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
