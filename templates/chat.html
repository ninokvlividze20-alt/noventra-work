{% extends 'base.html' %}
{% block content %}
<h2>საერთო ჩატი</h2>
<div class="chat-box" style="border:1px solid #333; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; color: white;">
    {% for msg in messages %}
        <p><strong>{{ msg.sender }}:</strong> {{ msg.text }}</p>
    {% endfor %}
</div>
<form method="POST">
    <input type="text" name="text" placeholder="დაწერე შეტყობინება..." required style="width: 80%;">
    <button type="submit">გაგზავნა</button>
</form>
<br>
<a href="{{ url_for('dashboard') }}">დაბრუნება დაშბორდზე</a>
{% endblock %}
