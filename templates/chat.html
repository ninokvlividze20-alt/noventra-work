<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVENTRA | Chat</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #4a90e2; --bg: #f4f7f6; }
        body, html { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }
        
        #chat-container { 
            display: flex; flex-direction: column; height: 100vh; width: 100%; 
            max-width: 600px; margin: 0 auto; background: white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .header { padding: 10px; background: #eee; text-align: center; border-bottom: 1px solid #ddd; }
        .header a { text-decoration: none; color: var(--primary); font-weight: bold; }
        
        #messages { 
            flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px;
            display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; 
        }
        
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; background: #eef2f5; font-size: 16px; }
        .msg b { color: var(--primary); }
        .admin-mention { border-left: 4px solid #e74c3c; background: #fff5f5; }
        
        form { 
            display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; 
            position: fixed; bottom: 0; width: 100%; max-width: 600px;
        }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 16px; }
        button { margin-left: 10px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div class="header">
            <a href="/dashboard">← კაბინეტში დაბრუნება</a>
        </div>
        <div id="messages">
            {% for msg in messages %}
                <p class="msg {{ 'admin-mention' if '@admin' in msg.text.lower() }}">
                    <b>{{ msg.sender }}:</b> {{ msg.text }}
                </p>
            {% endfor %}
        </div>
        <form id="chat-form">
            <input type="text" id="text" placeholder="დაწერე შეტყობინება..." autocomplete="off">
            <button type="submit">გაგზავნა</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('text');
        const msgs = document.getElementById('messages');

        // მესიჯის გაგზავნა
        form.onsubmit = async function(e) {
            e.preventDefault();
            const text = input.value.trim();
            if(text === "") return;

            input.value = ''; // ველის გასუფთავება
            
            try {
                await fetch('/send_message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text})
                });
                // მესიჯის გაგზავნისთანავე განახლება
                loadMessages();
            } catch (err) {
                console.error("შეცდომა:", err);
            }
        };

        // მესიჯების ავტომატური განახლება ყოველ 2 წამში
        async function loadMessages() {
            const res = await fetch('/get_messages');
            const data = await res.json();
            msgs.innerHTML = data.map(m => `
                <p class="msg ${m.text.toLowerCase().includes('@admin') ? 'admin-mention' : ''}">
                    <b>${m.sender}:</b> ${m.text}
                </p>
            `).join('');
            msgs.scrollTop = msgs.scrollHeight;
        }

        setInterval(loadMessages, 2000);
    </script>
</body>
</html>
