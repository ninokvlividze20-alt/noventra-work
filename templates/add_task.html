<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>დავალების დამატება</title>
    <style>
        body { background-color: #050505; color: #fff; padding: 40px; }
        input, textarea { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #121212; border: 1px solid #00ffcc; color: white; }
    </style>
</head>
<body>
    <h1>ახალი დავალების შექმნა</h1>
    <form method="POST">
        <input type="text" name="title" placeholder="დავალების სახელი" required>
        <textarea name="description" placeholder="აღწერა"></textarea>
        <input type="number" step="0.01" name="reward" placeholder="ჯილდო (ლარი)" required>
        <button type="submit" style="background: #00ffcc; padding: 10px 20px;">დამატება</button>
    </form>
</body>
</html>
