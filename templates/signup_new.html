{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="form-container" style="background-color: #121212; padding: 25px; border-radius: 15px; border: 1px solid #00ffcc; width: 320px;">
        <h2 style="color: #00ffcc; margin-bottom: 20px;">რეგისტრაცია</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <input type="text" name="username" placeholder="სახელი" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff;">
            <input type="email" name="email" placeholder="ელ-ფოსტა" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff;">
            <input type="password" name="password" placeholder="პაროლი" required style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff;">
            <button type="submit" style="width: 100%; padding: 12px; background-color: #00ffcc; border: none; border-radius: 5px; color: #000; font-weight: bold; cursor: pointer;">რეგისტრაცია</button>
        </form>
    </div>
</div>
{% endblock %}
